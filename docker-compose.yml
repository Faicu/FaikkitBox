services:
  faikkitbox:
    build: .
    container_name: faikkitbox
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Dacă Plex/Immich/qBittorrent/Agent rulează direct pe host (nu în Docker),
    # "127.0.0.1" din .env nu va fi vizibil din interiorul containerului.
    # Cea mai simplă soluție pe Linux: network_mode: host (elimină nevoia de port mapping de mai sus).
    # network_mode: host
